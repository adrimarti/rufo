name: Deploy static content to Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Create .env
        run: |
          echo "VITE_SUPABASE_URL=https://wuprutcshzmxkeewdooi.supabase.co" >> .env
          echo "VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1cHJ1dGNzaHpteGtlZXdkb29pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxOTQzMzUsImV4cCI6MjA4ODc3MDMzNX0.MMRGfeM6kUZsi5ljbVNE-vE-NJowutOldjOzAVHmeLk" >> .env
          echo "VITE_APP_USER_EMAIL=adrym14@gmail.com" >> .env
          echo "VITE_APP_USER_PASSWORD=13131313" >> .env

      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Build
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
